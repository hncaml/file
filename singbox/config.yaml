# 机场订阅，名称不能重复
proxy-providers:
  Airport_01:
    type: http
    interval: 43200
    timeout: 20000
    header:
      User-Agent:
        - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
    proxy: 🟢 直连
    url: "" 
    override:
      client-fingerprint: chrome
# 【安全2】强制关闭所有节点的 UDP 传输！彻底杜绝局域网 P2P 流量漏电触发 DoS 报警
    udp: false 

global-ua: clash

# 【新增】全局强制开启 TLS 浏览器指纹伪装
global-client-fingerprint: chrome
    
# 全局配置
port: 6300
socks-port: 6301
redir-port: 6302
mixed-port: 6303
tproxy-port: 6304
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
  
# 控制面板
external-controller: 0.0.0.0:6305
secret: ""
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# 匹配进程 always/strict/off
find-process-mode: off
keep-alive-idle: 600
keep-alive-interval: 30

# 策略组选择和fakeip缓存
profile:
  store-selected: true
  store-fake-ip: true
  
# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
#    - "rule-set:private_domain,cn_domain"
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.windowsupdate.com"
    - "+.microsoft.com"
    - "+.googleapis.com"
    - "+.icloud.com"
    - "+.amazonaws.com"
    - "+.samsung.com"
    - "+.hicloud.com"
    - "+.baidu.com"
    - "+.alibaba.com"
    - "+.qq.com"
    - "+.cdn.*.*"
    - "+.ads.*.*"
    - "+.analytics.*.*"
    - "rule-set:ad_domain"
  # 添加常见的 IoT 设备域名
    - "+.mi.com"
    - "+.xiaomi.com"
    - "+.huawei.com"
    - "+.lg.com"
    - "+.sony.com"
    - "+.philips.com"
    - "+.ikea.com"
    - "+.nest.com"
    - "+.alexa.com"
    - "+.tuya.com"
    - "+.smartthings.com"
  # 【修复】移除了这里拼写错误且位置不对的 route-exclude-addrss-set
    
# 代理模式
tun:
  enable: true
  stack: mixed
  mtu: 1500
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  # 【修复】将排除国内 IP 绕过 TUN 的设置移动到这里 ，并修正了拼写
#  route-exclude-address-set:
#    - "rule-set:cn_ip"
  
# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  cache-size: 4096
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16 # 【优化】改为标准的 Fake-IP 保留网段
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "rule-set:private_domain,cn_domain"
    - "+.services.googleapis.cn"
    - "+.xn--ngstr-lra8j.com"
    - "time.*.com"
  default-nameserver:
    - "223.5.5.5"
    - "119.29.29.29"
    - "114.114.114.114"
  nameserver:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"
    - "https://dns.alidns.com/dns-query"
#    - "https://doh.360.cn/dns-query"
#    - "223.5.5.5"
#    - "119.29.29.29"
#    - "114.114.114.114"
  proxy-server-nameserver:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"
  nameserver-policy:
    "rule-set:private_domain,cn_domain":
      - "223.5.5.5"
      - "119.29.29.29"
      - "114.114.114.114"
      - "https://dns.alidns.com/dns-query"
    "rule-set:geolocation-!cn,gfw_domain":
      - "https://dns.cloudflare.com/dns-query"
      - "https://dns.google/dns-query"
   
proxies:
- name: "🟢 直连"
  type: direct
  udp: true
 
# 锚点
pr: &pr {type: select, proxies: [🚀 节点选择, ♻️ 香港自动, ♻️ 日本自动,♻️ 新加坡自动, ♻️ 美国自动,♻️ 韩国自动, ♻️ 自动选择, 🔯 香港故转,🔯 日本故转,🔯 新加坡故转,🔯 美国故转,🔯 韩国故转,🇭🇰 香港节点, 🇯🇵 日本节点, SG 新加坡节点, 🇺🇲 美国节点, KR 韩国节点,🌐 全部节点, 🟢 直连]}

# 策略组
proxy-groups:
  - {name: 🚀 节点选择, type: select, proxies: [♻️ 香港自动, ♻️ 日本自动, ♻️ 新加坡自动,♻️ 美国自动,♻️ 韩国自动, ♻️ 自动选择, 🔯 香港故转,🔯 日本故转,🔯 新加坡故转,🔯 美国故转,🔯 韩国故转, 🇭🇰 香港节点, 🇯🇵 日本节点, SG 新加坡节点, 🇺🇲 美国节点, KR 韩国节点,🌐 全部节点, 🟢 直连]}
  - {name: 📹 YouTube,!!merge <<: *pr}
  - {name: 🐛 cloudflare,!!merge <<: *pr}
  - {name: 💞 pornhub,!!merge <<: *pr}
  - {name: 🍀 Google,!!merge <<: *pr}
  #- {name: 🤖 ChatGPT,!!merge <<: *pr}
  - {name: 💢 Meta,!!merge <<: *pr}
  - {name: 👨🏿‍💻 GitHub,!!merge <<: *pr}
  - {name: 🐬 OneDrive,!!merge <<: *pr}
  - {name: 🪟 Microsoft,!!merge <<: *pr}
  - {name: 🎵 TikTok,!!merge <<: *pr}
  - {name: 📲 Telegram,!!merge <<: *pr}
  - {name: 🎥 NETFLIX,!!merge <<: *pr}
  - {name: ✈️ Speedtest,!!merge <<: *pr}
  - {name: 💶 PayPal,!!merge <<: *pr}
  - {name: 🍎 Apple, type: select, proxies: [🟢 直连, 🚀 节点选择]}
  - {name: 🐟 漏网之鱼,!!merge <<: *pr}
  - {name: 🇭🇰 香港节点, type: select, include-all: true, filter: "(?i)港|hk|hongkong|hong kong"}
  - {name: 🇯🇵 日本节点, type: select, include-all: true, filter: "(?i)日|jp|japan"}
  - {name: SG 新加坡节点, type: select, include-all: true, filter: "(?i)新|sg|SG|Singapore"}
  - {name: 🇺🇲 美国节点, type: select, include-all: true, filter: "(?i)美|us|united states|united states"}
  - {name: KR 韩国节点, type: select, include-all: true, filter: "(?i)韩|kr|KR|South Korea|Korea"}
  # 【优化】将 tolerance 从 20 放宽到 50，避免网络微小波动导致频繁切换节点
  - {name: 🔯 香港故转, type: fallback, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: 🔯 日本故转, type: fallback, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$" }  
  - {name: 🔯 新加坡故转, type: fallback, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(新|SG|(?i)Singapore))^((?!(港|台|韩|日|美)).)*$" }  
  - {name: 🔯 美国故转, type: fallback, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$" }  
  - {name: 🔯 韩国故转, type: fallback, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(韩|kr|KR|South Korea|Korea))^((?!(港|台|日|英|新)).)*$" }  
  - {name: ♻️ 香港自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$" }
  - {name: ♻️ 新加坡自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(新|SG|(?i)Singapore))^((?!(港|台|韩|日|美)).)*$" }
  - {name: ♻️ 美国自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"}
  - {name: ♻️ 韩国自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(韩|kr|KR|South Korea|Korea))^((?!(港|台|日|英|新)).)*$"}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "^((?!(直连)).)*$"}
  - {name: 🌐 全部节点, type: select, include-all: true}

rules:
  # 【修复】补充了广告拦截规则，否则下载了 ad_domain 规则集也无法生效
  - RULE-SET,ad_domain,REJECT

  # 【允许 NAS 刮削海报】如果您用飞牛影视中心，这几行必须放在 NAS 直连规则的上面
  - DOMAIN-SUFFIX,themoviedb.org,🚀 节点选择
  - DOMAIN-SUFFIX,tmdb.org,🚀 节点选择
  - DOMAIN-SUFFIX,tvdb.com,🚀 节点选择
  - DOMAIN-SUFFIX,fanart.tv,🚀 节点选择
  
  # 【核心防御】精准锁定飞牛 NAS，将其余所有流量（包括 BT 下载）强制直连！
#  - SRC-IP-CIDR,192.168.1.24/32,🟢 直连

  # 拦截 meta_domain 集合中的 UDP 443 端口，强制 Meta 设备降级使用 TCP 下载固件（解决更新卡死）
#  - AND,((NETWORK,UDP),(DEST-PORT,443),(RULE-SET,meta_domain)),REJECT

  # 【新增】秒拒 QUIC 流量，强制浏览器瞬间回退到 TCP (HTTP/2)，提升网页秒开速度
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,8443)),REJECT

  # 【网关专用】防止局域网设备（如 NAS、电脑）BT 下载走代理消耗机场流量
  - DST-PORT,6881-6889,🟢 直连
  - DST-PORT,51413,🟢 直连
  - DST-PORT,1900,🟢 直连
  - DST-PORT,5353,🟢 直连
#  - IP-ASN,20473,🟢 直连,no-resolve
  
# 高频直连或拒绝提前
  - DOMAIN-SUFFIX,lan,🟢 直连
  - DOMAIN-SUFFIX,local,🟢 直连
  - DOMAIN-SUFFIX,qq.com,🟢 直连
  - DOMAIN-SUFFIX,camxl.top,🟢 直连
  - DOMAIN-SUFFIX,dkys.org,REJECT
  - DOMAIN-SUFFIX,youtusoft.com,REJECT
  - DOMAIN-SUFFIX,hostbuf.com,REJECT
  - DOMAIN-SUFFIX,tcpspeed.com,REJECT
  - DOMAIN-SUFFIX,wn1998.com,REJECT

  # 私有/内网优先
  - RULE-SET,private_domain,🟢 直连
  - RULE-SET,private_ip,🟢 直连,no-resolve

  # 系统/推送服务提前
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,google_ip,🍀 Google,no-resolve
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft

  # 高流量业务优先
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,netflix_ip,🎥 NETFLIX,no-resolve
  - RULE-SET,telegram_domain,📲 Telegram

  # 代理分流
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve
  - RULE-SET,meta_domain,💢 Meta
  #- RULE-SET,ai,🤖 ChatGPT

  # 其他规则集
  - RULE-SET,cloudflare_domain,🐛 cloudflare
  - RULE-SET,cloudflare_ip,🐛 cloudflare,no-resolve
  - RULE-SET,pornhub_domain,💞 pornhub
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,speedtest_domain,✈️ Speedtest
  - RULE-SET,paypal_domain,💶 PayPal

  # 区域分流规则最后
  - RULE-SET,proxylite,🚀 节点选择
  - RULE-SET,geolocation-!cn,🚀 节点选择
  - RULE-SET,cn_domain,🟢 直连
  - RULE-SET,cn_ip,🟢 直连,no-resolve

  # 最后兜底
  - MATCH,🐟 漏网之鱼

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  #qcy: &qcy {type: http, interval: 86400, behavior: domain, format: text}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

